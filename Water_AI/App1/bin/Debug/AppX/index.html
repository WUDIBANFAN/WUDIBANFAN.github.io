<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水处理AI智能助手</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>水处理AI智能平台</h1>
        <nav>
            <ul>
                <li><a href="#features" class="active">功能介绍</a></li>
                <li><a href="#applications">应用场景</a></li>
                <li><a href="#agent">智能体接入</a></li>
                <li><a href="#contact">联系我们</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="features" class="section">
            <h2>AI功能介绍</h2>
            <ul class="features-list">
                <li>实时水质分析</li>
                <li>污染预测与预警</li>
                <li>设备故障诊断</li>
                <li>优化水处理流程</li>
                <li>节能减排建议</li>
            </ul>
            <div class="section-image">
                <img src="https://images.unsplash.com/photo-1563371351-e53ebb744a1f" alt="水处理示意图">
            </div>
        </section>

        <section id="applications" class="section">
            <h2>应用场景</h2>
            <ul class="applications-list">
                <li>城市污水处理厂</li>
                <li>工业废水管理</li>
                <li>水质监管部门</li>
                <li>农业灌溉系统</li>
                <li>智能环保平台</li>
            </ul>
            <div class="section-image">
                <img src="https://images.unsplash.com/photo-1581091215367-6594f6cfb88b" alt="AI应用场景图">
            </div>
        </section>

        <section id="agent" class="section">
            <h2>接入智能体</h2>
            <p>我们的智能体由 Coze 提供支持，点击或使用下方窗口即可与 AI 互动，获取水处理建议。</p>
            <iframe src="https://www.coze.cn/store/agent/7480800855546380299?bot_id=true"
                    width="100%" height="600" style="border: none; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            </iframe>
        </section>

        <section id="contact" class="section">
            <h2>联系我们</h2>
            <form id="contact-form">
                <label for="name">姓名</label>
                <input type="text" id="name" required>

                <label for="email">邮箱</label>
                <input type="email" id="email" required>

                <label for="message">留言</label>
                <textarea id="message" rows="5" required></textarea>

                <button type="submit">发送</button>
            </form>
        </section>

        <div class="cta-button">
            <a href="#agent">立即体验智能体</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 水处理AI智能平台. 保留所有权利.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
